# =============================================================================
# 实验配置文件
# `active` 选当前要跑哪个实验；run.py 也可用 --experiment 覆盖。
# 用哪个模型由 configs/models.yaml 决定 (单一模型，换模型就改 models.yaml)。
# 结果路径：results/<experiment>/<model_key>/...
# =============================================================================

active: baseline_quick

global:
  output_dir: results
  random_seed: 20231212    # 与论文价格生成保持同分布
  num_subjects: 100        # 每个 (领域 × 条件) 模拟多少个"个体"
  rounds_per_subject: 25   # 每个个体多少轮 (论文为 25)
  save_raw_responses: true
  retry: 3
  log_level: INFO

experiments:

  # 1) 烟雾测试：1 领域 × 2 subject。10 分钟内跑完。
  smoke_test:
    description: "Pipeline check; tiny run."
    domains: [risk]
    conditions: [baseline]
    variations:
      temperatures: [0.0]
      demographics: [none]
    overrides:
      num_subjects: 2

  # 2) 论文 baseline 简版：4 领域 × baseline，每个 20 subject。
  baseline_quick:
    description: "Baseline replication with reduced sample size."
    domains: [risk, time, social, food]
    conditions: [baseline]
    variations:
      temperatures: [0.0]
      demographics: [none]
    overrides:
      num_subjects: 20

  # 3) 完整 baseline：4 领域 × baseline × 100 subject (Fig.1-3)
  paper_baseline:
    description: "Full baseline reproduction (matches main text Fig 1-3)."
    domains: [risk, time, social, food]
    conditions: [baseline]
    variations:
      temperatures: [0.0]
      demographics: [none]

  # 4) 框架敏感性：baseline + price framing + discrete choice (Fig.4)
  framing_sensitivity:
    description: "Compare baseline vs price-framing vs discrete choice."
    domains: [risk, time, social, food]
    conditions: [baseline, price_framing, discrete_choice]
    variations:
      temperatures: [0.0]
      demographics: [none]

  # 5) 温度扫描 (Fig.4 中的 temp 部分)
  temperature_sweep:
    description: "Vary temperature across 0 / 0.5 / 1.0."
    domains: [risk, time, social, food]
    conditions: [baseline]
    variations:
      temperatures: [0.0, 0.5, 1.0]
      demographics: [none]

  # 6) 人口学变体 (Fig.4 右半部分)
  demographic_variants:
    description: "Inject demographic descriptors into the system prompt."
    domains: [risk, time, social, food]
    conditions: [baseline]
    variations:
      temperatures: [0.0]
      demographics:
        - female
        - male
        - kid
        - elder
        - low_edu
        - high_edu
        - asian
        - black

  # 7) 完整复现：全部条件 × 全部变体 (单模型，时间长)
  full_replication:
    description: "Everything: condition x temperature x demographic."
    domains: [risk, time, social, food]
    conditions: [baseline, price_framing, discrete_choice]
    variations:
      temperatures: [0.0, 0.5, 1.0]
      demographics:
        - none
        - female
        - male
        - kid
        - elder
        - low_edu
        - high_edu
        - asian
        - black
